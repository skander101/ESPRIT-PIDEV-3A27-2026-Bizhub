# Configuration SMTP pour l'envoi des emails de validation (participation)
# L'email est envoyé À l'adresse du participant (user qui fait la participation).
# Gmail : si erreur d'authentification, activez la 2FA et créez un "mot de passe d'application" (compte Google > Sécurité).

SMTP_HOST=smtp.gmail.com
SMTP_PORT=587
SMTP_USER=benmoussaaziz.contact@gmail.com
SMTP_PASS=arsmnjhxryivhajc
SMTP_FROM=benmoussaaziz.contact@gmail.com

# ----- Lien Google Meet automatique ("Créer le lien automatiquement") -----
# À remplir pour que le bouton crée le lien Meet tout seul (voir CONFIG-GOOGLE-MEET.md).

# Chemin complet vers le fichier JSON du compte de service (téléchargé depuis Google Cloud).
# Exemple Windows : C:/Users/VotreNom/Downloads/projet-xxx-123456.json
# Exemple Linux/Mac : /home/user/meet-credentials.json
GOOGLE_MEET_CREDENTIALS_PATH=

# ID du calendrier sur lequel créer l'événement Meet. Souvent votre adresse Gmail.
# Ce calendrier doit être partagé en "éditeur" avec l'email du compte de service.
GOOGLE_CALENDAR_ID=benmoussaaziz.contact@gmail.com
